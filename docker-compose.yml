# use:
#   docker-compose build       
#   docker-compose up          
#   docker-compose up -d       
#   docker-compose down        
#   docker-compose logs -f
#
# access:
#   frontend UI:   http://localhost:8081
#   backend API:  http://localhost:8000/api/sources

services:
  

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ocean-viz-backend
    

    ports:
      - "8000:8000"
    

    volumes:
      - ./backend/data:/app/data
    

    restart: unless-stopped
    

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s   
  
  

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ocean-viz-frontend
    

    ports:
      - "8081:80"
    

    depends_on:
      backend:
        condition: service_started
    
    restart: unless-stopped


