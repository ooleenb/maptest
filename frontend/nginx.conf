# ============================================================
# Nginx config for Ocean Viz frontend
# ============================================================
# 作用:
#   1. Serve 编译好的 dist/ 静态文件
#   2. 把 /api/* 请求反代到 backend 容器的 :8000

server {
    # 监听容器内 80 端口
    listen 80;
    server_name _;
    
    # 静态文件根目录 (Dockerfile 把 dist/ 复制到这)
    root /usr/share/nginx/html;
    index index.html;
    
    # ------------------------------------------------------------
    # API 反代: /api/* → backend:8000/api/*
    # ------------------------------------------------------------
    # 注意:
    #   "backend" 是 docker-compose.yml 里定义的服务名,
    #   两个容器在同一个 docker 网络里, 可以直接用服务名互访
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 大文件 (grid.json 60 MB, day data 87 MB) 需要更长超时
        proxy_connect_timeout 60s;
        proxy_send_timeout    300s;   # 上传 timeout
        proxy_read_timeout    300s;   # 后端 prep_day 可能跑 50+ 秒
        
        # 别缓冲大响应 (让浏览器流式接收)
        proxy_buffering off;
    }
    
    # ------------------------------------------------------------
    # 静态文件 + SPA fallback
    # ------------------------------------------------------------
    # SPA (Single Page App) 特性: 所有 URL 都返回 index.html,
    # React Router (如果将来有) 在前端自己处理路由
    location / {
        try_files $uri $uri/ /index.html;
        
        # 静态资源 (有 hash, 永远不变) 长缓存
        location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
        
        # HTML 不缓存 (每次刷新拿最新)
        location ~* \.(html)$ {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }
    
    # ------------------------------------------------------------
    # 健康检查端点 (docker-compose 用)
    # ------------------------------------------------------------
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
    
    # ------------------------------------------------------------
    # 错误处理
    # ------------------------------------------------------------
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
    
    # 大响应 body 限制 (默认 1MB 太小, 我们要传 60MB grid.json)
    client_max_body_size 100M;
}
